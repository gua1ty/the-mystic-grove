{% extends 'base.html' %}

{% block title%}
Registration
{% endblock%}

{%block content%}

<div class="col-12">
    <div class="row justify-content-center mt-5">

        <div class="col-12 col-md-6 col-lg-4">

            <div class="register-card card shadow-sm">

                <div class="card-body p-4">

                    <h3 class="gold-light text-center mb-4">Create your account</h3>

                    <form action="/register" method="post">

                        <div class="mb-3">
                            <label for="txt_username" class="form-label light">Username</label>
                            <input type="text" class="form-control"
                                name="txt_username"
                                id="txt_username" placeholder="Insert your username"
                                minlength="3" maxlength="25" required />
                        </div>

                        <div class="mb-3">
                            <label for="txt_email" class="form-label light">Email</label>
                            <input type="email" class="form-control"
                                name="txt_email"
                                id="txt_email" placeholder="Insert your email"
                                required />
                        </div>

                        <div class="mb-3">
                            <label for="txt_password" class="form-label light">Password</label>
                            <input type="password" class="form-control"
                                name="txt_password"
                                id="txt_password" placeholder="Insert your password"
                                minlength="8" required />
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit"
                                class="btn btn-light-gold w-100">Register</button>
                        </div>

                        <div class="text-center mt-3">
                            <small class="light">
                                Already have an account? <a href="{{ url_for('login') }}"
                                    class="text-decoration-none gold-light fw-bold">Log in here</a>
                            </small>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{%endblock%}
